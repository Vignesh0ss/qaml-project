name: QAML CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest pytest-cov
        
    - name: Lint with flake8
      run: |
        flake8 backend/app backend/tests --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Pytest
      env:
        PYTHONPATH: "backend"
        MONGO_URI: "mongodb://localhost:27017/qaml_test_db"
      run: |
        pytest backend/tests/ -v --cov=backend/app --cov-report=xml
        
  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: |
        docker-compose -f infra/docker-compose.yml build
