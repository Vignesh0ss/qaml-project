version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.production
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongo:27017/
      - MONGODB_DB=quantum_drug_repurposing
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.pipeline_tasks worker --loglevel=info
    env_file:
      - ../.env.production
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongo:27017/
      - MONGODB_DB=quantum_drug_repurposing
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  mongo:
    image: mongo:7
    volumes:
      - mongo_prod_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017" # Accessible locally for database backups/inspects if firewall allows
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped

volumes:
  mongo_prod_data:
  redis_prod_data:
